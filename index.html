<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ANADOLU NETWORK FIRE OS | Dijital Devlet İşletim Sistemi</title>
    <!-- Tailwind + Fonts + Icons + Charts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0a2b3e 0%, #05212e 100%);
            font-family: 'Inter', sans-serif;
            color: #E4A030; /* turuncuya yakın altın */
        }
        .gold-text { color: #E4A030; }
        .gold-border { border-color: #E4A030; }
        .gold-bg { background-color: rgba(228, 160, 48, 0.15); }
        .glass-card {
            background: rgba(10, 35, 50, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(228, 160, 48, 0.4);
            border-radius: 1.5rem;
            transition: all 0.2s;
        }
        .glass-card:hover {
            border-color: #E4A030;
            box-shadow: 0 8px 25px rgba(228, 160, 48, 0.15);
        }
        .sidebar-icon {
            transition: all 0.2s;
            color: #E4A030;
        }
        .sidebar-icon:hover {
            transform: translateX(5px);
            text-shadow: 0 0 6px #E4A030;
        }
        .btn-gold {
            background: rgba(228, 160, 48, 0.15);
            border: 1px solid #E4A030;
            transition: 0.2s;
            color: #E4A030;
        }
        .btn-gold:hover {
            background: #E4A030;
            color: #05212e;
        }
        .event-log {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
        }
        .gold-badge {
            background: rgba(228, 160, 48, 0.2);
            border-left: 3px solid #E4A030;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a2b3e; }
        ::-webkit-scrollbar-thumb { background: #E4A030; border-radius: 10px; }
        input, select, textarea {
            background-color: #0a2b3e;
            border: 1px solid #E4A030;
            color: #E4A030;
            border-radius: 8px;
            padding: 6px 12px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #F0B050;
        }
        .table-custom td, .table-custom th {
            padding: 8px;
            border-bottom: 1px solid rgba(228,160,48,0.3);
        }
    </style>
</head>
<body>

    <!-- LOGIN / EMAIL + ŞİFRE KORUMALI YÖNETİM PANELİ MODAL -->
    <div id="loginOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center">
        <div class="bg-[#0a2b3e] border-2 border-[#E4A030] rounded-2xl p-8 w-96 shadow-2xl text-center">
            <i class="fas fa-shield-alt text-5xl text-[#E4A030] mb-4"></i>
            <h2 class="text-2xl font-bold gold-text">YÖNETİM PANELİ GİRİŞİ</h2>
            <p class="text-gray-300 text-sm mb-4">Anadolu Network FIRE OS · Yetkili Erişim</p>
            <input type="email" id="loginEmail" placeholder="E-posta" class="w-full p-2 mb-3 bg-gray-800 border border-[#E4A030] text-white rounded">
            <input type="password" id="loginPassword" placeholder="Şifre" class="w-full p-2 mb-4 bg-gray-800 border border-[#E4A030] text-white rounded">
            <button onclick="checkEmailPassword()" class="btn-gold w-full py-2 rounded-lg font-bold">GİRİŞ YAP</button>
            <p class="text-xs text-gray-400 mt-4">Demo: <span class="gold-text">admin@fireos.com / fire2026</span></p>
        </div>
    </div>

    <!-- ANA DASHBOARD (başlangıçta gizli) -->
    <div id="mainDashboard" class="hidden ml-0 md:ml-20 transition-all">
        <!-- SIDEBAR (Yan Menü - Anasayfa Paneli) -->
        <div class="fixed left-0 top-0 h-full w-20 bg-[#05212e]/90 backdrop-blur-xl border-r border-[#E4A030]/40 z-30 flex flex-col items-center py-6 gap-6">
            <div class="text-2xl font-black gold-text">FN</div>
            <nav class="flex flex-col gap-6 text-xl">
                <i class="fas fa-tachometer-alt sidebar-icon cursor-pointer" onclick="showMainDashboard()" title="Anasayfa"></i>
                <i class="fas fa-users sidebar-icon cursor-pointer" onclick="showCitizensPanel()" title="Vatandaş Yönetimi"></i>
                <i class="fas fa-boxes sidebar-icon cursor-pointer" onclick="showPackagesPanel()" title="Paket Yönetimi"></i>
                <i class="fas fa-chart-line sidebar-icon"></i>
                <i class="fas fa-graduation-cap sidebar-icon"></i>
                <i class="fas fa-cog sidebar-icon"></i>
            </nav>
            <div class="mt-auto mb-8 text-xs gold-text/60">
                <i class="fas fa-lock"></i> ZTA
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div id="dynamicContent" class="p-5 md:p-6 max-w-[1600px]">
            <!-- Anasayfa içeriği (default) -->
        </div>
    </div>

    <script>
        // ---------- STATE MANAGEMENT (CRUD için) ----------
        let citizensList = [
            { id: 1, name: "Ahmet Yılmaz", identity: "FIRE-1001", financeScore: 78, eduScore: 82, behaviorScore: 85, govScore: 70 },
            { id: 2, name: "Zeynep Kaya", identity: "FIRE-1002", financeScore: 92, eduScore: 88, behaviorScore: 90, govScore: 84 }
        ];
        let packagesList = [
            { id: 1, name: "Temel Vatandaşlık", price: "Ücretsiz", features: "e-Devlet erişimi, temel eğitim" },
            { id: 2, name: "Girişimci Paketi", price: "₺249/ay", features: "FIRE:Yapay Zeka University Pro, yatırım araçları" },
            { id: 3, name: "Elite Yatırımcı", price: "₺699/ay", features: "Portföy yönetimi, AI stratejileri" },
            { id: 4, name: "Kurumsal Devlet", price: "Özel", features: "Tam API erişimi, politika simülasyonu" }
        ];

        // Global charts
        let financeChart, gdpChart;

        // Dinamik veriler
        let citizenData = {
            behavior: 82, finance: 76, education: 81, governance: 74, composite: 78.4,
            wallet: 24500, creditScore: 715, gdpGrowth: 2.4, capitalFlow: 67, activeLearners: 12401
        };
        let eventHistory = ["system.boot: ANADOLU FIRE OS aktif", "finance.transaction: yatırım emri iletildi", "ai.policy.generated: yeni strateji"];

        // Erdem Yolu kademeleri (skora göre)
        function getErdemRank(score) {
            if (score >= 95) return "Kağan";
            if (score >= 88) return "Pir";
            if (score >= 80) return "Lider";
            if (score >= 72) return "Yoldaş";
            if (score >= 64) return "Uzman";
            if (score >= 55) return "Usta";
            return "Ortak";
        }

        function addEvent(msg) {
            eventHistory.unshift(msg);
            if(eventHistory.length > 8) eventHistory.pop();
            const logDiv = document.getElementById('eventLog');
            if(logDiv) logDiv.innerHTML = eventHistory.map(e => `<div>→ ${e}</div>`).join('');
        }

        function updateUI() {
            // Ana sayfa elementleri varsa güncelle
            if(document.getElementById('behaviorScore')) document.getElementById('behaviorScore').innerText = citizenData.behavior;
            if(document.getElementById('financeScore')) document.getElementById('financeScore').innerText = citizenData.finance;
            if(document.getElementById('eduScore')) document.getElementById('eduScore').innerText = citizenData.education;
            if(document.getElementById('govScore')) document.getElementById('govScore').innerText = citizenData.governance;
            let comp = (citizenData.finance*0.30 + citizenData.education*0.25 + citizenData.behavior*0.25 + citizenData.governance*0.20).toFixed(1);
            citizenData.composite = comp;
            if(document.getElementById('compositeScore')) document.getElementById('compositeScore').innerText = comp;
            if(document.getElementById('compositeBar')) document.getElementById('compositeBar').style.width = Math.min(100, comp) + '%';
            let rank = getErdemRank(parseFloat(comp));
            if(document.getElementById('citizenRank')) document.getElementById('citizenRank').innerHTML = `🏆 ${rank} Yolu · ${rank} Vatandaş`;
            if(document.getElementById('walletAmt')) document.getElementById('walletAmt').innerHTML = `₺${citizenData.wallet.toLocaleString()}`;
            if(document.getElementById('creditScoreNum')) document.getElementById('creditScoreNum').innerText = citizenData.creditScore;
            if(document.getElementById('gdpGrowth')) document.getElementById('gdpGrowth').innerHTML = `+${citizenData.gdpGrowth}%`;
            if(document.getElementById('capitalFlowIdx')) document.getElementById('capitalFlowIdx').innerText = citizenData.capitalFlow;
            if(document.getElementById('activeLearners')) document.getElementById('activeLearners').innerText = citizenData.activeLearners.toLocaleString();
            if(document.getElementById('apiLatency')) document.getElementById('apiLatency').innerText = Math.floor(20 + Math.random() * 25) + 'ms';
            
            // chart güncellemeleri
            if(financeChart) {
                let newVal = citizenData.wallet / 1000;
                let newArr = financeChart.data.datasets[0].data.slice(1);
                newArr.push(newVal);
                financeChart.data.datasets[0].data = newArr;
                financeChart.update();
            }
            if(gdpChart) {
                let newGdp = 100 + (parseFloat(citizenData.gdpGrowth) * 1.2);
                let gdpArr = gdpChart.data.datasets[0].data.slice(1);
                gdpArr.push(newGdp);
                gdpChart.data.datasets[0].data = gdpArr;
                gdpChart.update();
            }
        }

        function realTimeSimulation() {
            citizenData.behavior = Math.min(100, Math.max(40, citizenData.behavior + (Math.random() * 2 - 0.8)));
            citizenData.finance = Math.min(98, Math.max(35, citizenData.finance + (Math.random() * 2 - 0.5)));
            citizenData.education = Math.min(99, citizenData.education + (Math.random() * 1.5 - 0.3));
            citizenData.governance = Math.min(96, citizenData.governance + (Math.random() * 1.2 - 0.4));
            citizenData.wallet += Math.floor(Math.random() * 400 - 100);
            citizenData.wallet = Math.max(5000, citizenData.wallet);
            citizenData.creditScore = Math.min(850, Math.max(550, citizenData.creditScore + Math.floor(Math.random() * 6 - 2)));
            citizenData.gdpGrowth = (parseFloat(citizenData.gdpGrowth) + (Math.random() * 0.8 - 0.3)).toFixed(1);
            citizenData.capitalFlow = Math.min(90, Math.max(45, citizenData.capitalFlow + (Math.random() * 2 - 0.6)));
            citizenData.activeLearners += Math.floor(Math.random() * 20);
            if(Math.random() > 0.7) {
                const events = ["finance.transaction.executed: yeni yatırım", "education.progress.updated: modül tamamlandı", "tax.synced: vergi güncellemesi", "system.risk.detected: düşük anomali"];
                let randEv = events[Math.floor(Math.random() * events.length)];
                addEvent(randEv);
            }
            updateUI();
        }

        function updateClock() {
            let now = new Date();
            let timeEl = document.getElementById('liveTime');
            if(timeEl) timeEl.innerHTML = now.toLocaleTimeString('tr-TR');
        }

        function initCharts() {
            const ctxFinance = document.getElementById('financeTrendChart');
            if(ctxFinance) {
                const ctx = ctxFinance.getContext('2d');
                if(financeChart) financeChart.destroy();
                financeChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['H1', 'H2', 'H3', 'H4', 'H5', 'Şimdi'], datasets: [{ label: 'Net Değer (₺K)', data: [22, 24, 23.5, 25, 26.2, citizenData.wallet/1000], borderColor: '#E4A030', fill: false }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#E4A030' } } } }
                });
            }
            const ctxGdp = document.getElementById('gdpSimChart');
            if(ctxGdp) {
                const ctx2 = ctxGdp.getContext('2d');
                if(gdpChart) gdpChart.destroy();
                gdpChart = new Chart(ctx2, {
                    type: 'bar',
                    data: { labels: ['Çeyrek1', 'Çeyrek2', 'Çeyrek3', 'Tahmin'], datasets: [{ label: 'Büyüme İndeksi', data: [102, 104, 106.5, 108.2], backgroundColor: '#E4A030' }] },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#E4A030' } } } }
                });
            }
        }

        // AI Policy Simülasyonu
        window.simulateAIPolicy = function() {
            const policies = [
                "Eğitim yatırımı +%15 → GSYH +%2.7, risk düşük.",
                "Kredi genişlemesi %5 → tüketim artar, sistemik risk ORTA.",
                "Teknoloji vergi muafiyeti → Ar-Ge yatırımı +%12, istihdam artışı.",
                "Erdemliler fonu: girişimcilere destek, finansal özgürlük endeksi +3 puan."
            ];
            let selected = policies[Math.floor(Math.random() * policies.length)];
            let recDiv = document.getElementById('aiRecommendation');
            if(recDiv) recDiv.innerHTML = `🧠 AI Öneri: ${selected}`;
            addEvent(`ai.policy.generated: ${selected.substring(0, 60)}`);
            citizenData.gdpGrowth = (2.0 + Math.random() * 2.5).toFixed(1);
            citizenData.capitalFlow = Math.min(95, citizenData.capitalFlow + (Math.random() * 4 - 1));
            citizenData.wallet += Math.floor(Math.random() * 800 - 200);
            updateUI();
        };

        // ----- ANA SAYFA (Dashboard) -----
        function renderMainDashboard() {
            const html = `
                <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
                    <div>
                        <h1 class="text-3xl font-extrabold tracking-tight"><span class="bg-gradient-to-r from-[#E4A030] to-orange-500 bg-clip-text text-transparent">ANADOLU NETWORK FIRE OS</span> <span class="text-xs font-mono bg-[#E4A030]/20 px-2 py-0.5 rounded-md">v3.0 · Dijital Devlet İşletim Sistemi</span></h1>
                        <p class="gold-text/70 text-sm flex gap-2 mt-1"><i class="fas fa-gem"></i> Erdem Yolu: Ortak, Usta, Uzman, Yoldaş, Lider, Pir, Kağan</p>
                    </div>
                    <div class="flex gap-2 text-xs">
                        <div class="bg-black/40 p-2 rounded-xl border border-[#E4A030]/30"><i class="fas fa-sync-alt"></i> Gerçek Zamanlı: <span id="liveTime">--:--:--</span></div>
                        <div class="bg-black/40 p-2 rounded-xl"><i class="fas fa-shield-alt gold-text"></i> AI Karar Motoru: Aktif</div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-5">
                    <!-- Vatandaş Dijital İkiz + Erdem Kademesi -->
                    <div class="glass-card p-5">
                        <div class="flex justify-between"><h3 class="font-bold gold-text"><i class="fas fa-id-card"></i> Vatandaş Dijital İkiz</h3><span id="compositeScore" class="text-2xl font-black">78.4</span></div>
                        <div class="mt-2 space-y-1 text-sm">
                            <div>Kimlik: <span class="gold-text">FIRE-9842-X</span> | Doğrulama Seviye 3</div>
                            <div>Davranış Skoru: <span id="behaviorScore">82</span> | Finans: <span id="financeScore">76</span></div>
                            <div>Eğitim: <span id="eduScore">81</span> | Yönetişim: <span id="govScore">74</span></div>
                            <div class="w-full bg-gray-700 rounded-full h-2 mt-2"><div id="compositeBar" class="bg-[#E4A030] h-2 rounded-full" style="width:78%"></div></div>
                            <div class="text-xs gold-text/80 mt-2">🏆 Erdem Yolu: <span id="citizenRank">Yoldaş</span></div>
                        </div>
                    </div>
                    <!-- Finansal Sistem -->
                    <div class="glass-card p-5">
                        <h3 class="font-bold gold-text"><i class="fas fa-coins"></i> Finansal Sistem Motoru</h3>
                        <div class="grid grid-cols-2 gap-2 mt-2 text-sm">
                            <div>Cüzdan: <span id="walletAmt" class="gold-text">₺24,500</span></div>
                            <div>Kredi Skoru: <span id="creditScoreNum" class="gold-text">715</span></div>
                            <div>Yatırım Portföy: ₺86,200</div>
                            <div>Pasif Gelir: ₺3,240/ay</div>
                        </div>
                        <canvas id="financeTrendChart" height="100" class="mt-2"></canvas>
                        <div class="text-xs gold-text/80 mt-1">FIRE Model: Tasarruf → Yatırım → Özgürlük</div>
                    </div>
                    <!-- FIRE Üniversitesi -->
                    <div class="glass-card p-5">
                        <h3 class="font-bold gold-text"><i class="fas fa-graduation-cap"></i> FIRE Yapay Zeka Üniversitesi</h3>
                        <div class="flex justify-between text-sm"><span>Finansal Okuryazarlık</span><span>84%</span></div><div class="w-full bg-gray-700 rounded-full h-1.5"><div class="bg-[#E4A030] h-1.5 rounded-full" style="width:84%"></div></div>
                        <div class="flex justify-between text-sm mt-1"><span>Girişimcilik</span><span>71%</span></div><div class="w-full bg-gray-700 rounded-full h-1.5"><div class="bg-[#E4A030] h-1.5 rounded-full" style="width:71%"></div></div>
                        <div class="mt-2 text-xs">Aktif Öğrenen: <span id="activeLearners">12,401</span> | Sertifikalar: +234</div>
                        <div class="gold-badge p-2 mt-2 rounded text-xs">Üretim temelli öğrenme → Liderlik zinciri aktif</div>
                    </div>
                    <!-- e-Devlet -->
                    <div class="glass-card p-5">
                        <h3 class="font-bold gold-text"><i class="fas fa-landmark"></i> e-Devlet Simülasyon Katmanı</h3>
                        <div class="space-y-1 text-xs mt-2">✔ Vergi Durumu: Mükellef<br>✔ SGK: 4A aktif<br>📚 MEB/YÖK: Lisans mezunu<br>🏥 Sağlık Profili: Düşük risk</div>
                        <div class="mt-2 text-center text-[11px] bg-[#E4A030]/10 p-1 rounded">Son senkronizasyon: 2 saniye önce</div>
                    </div>
                    <!-- AI Motoru (Çalışır durumda) -->
                    <div class="glass-card p-5">
                        <div class="flex justify-between"><h3 class="font-bold gold-text"><i class="fas fa-microchip"></i> AI Strateji Motoru</h3><i class="fas fa-brain"></i></div>
                        <div id="aiRecommendation" class="bg-black/30 p-2 rounded text-xs mt-2">📊 Politik simülasyon: Eğitim yatırımı +%2 GSYH etkisi, risk düşük.</div>
                        <button onclick="simulateAIPolicy()" class="btn-gold text-xs px-3 py-1 rounded-full mt-2">Yeni AI Önerisi Üret</button>
                    </div>
                    <!-- Ekonomi Simülasyonu -->
                    <div class="glass-card p-5">
                        <h3 class="font-bold gold-text"><i class="fas fa-chart-line"></i> Ekonomik Simülasyon (Monte Carlo)</h3>
                        <canvas id="gdpSimChart" height="90"></canvas>
                        <div class="flex justify-between text-xs mt-1"><span>GSYH Büyüme: <span id="gdpGrowth" class="gold-text">+2.4%</span></span></div>
                        <div class="mt-1 text-xs">Sermaye Akışı: <span id="capitalFlowIdx">67</span> | İşgücü Verimliliği: 103.2</div>
                    </div>
                    <!-- Event Stream (Gerçek zamanlı) -->
                    <div class="glass-card p-5">
                        <h3 class="font-bold gold-text"><i class="fas fa-stream"></i> Gerçek Zamanlı Olay Akışı</h3>
                        <div id="eventLog" class="h-28 overflow-y-auto text-[11px] font-mono space-y-1 bg-black/30 p-2 rounded mt-1"></div>
                    </div>
                    <!-- Sistem Sağlığı -->
                    <div class="glass-card p-5">
                        <h3 class="font-bold gold-text"><i class="fas fa-heartbeat"></i> Sistem Sağlığı</h3>
                        <div class="grid grid-cols-2 gap-1 text-xs">
                            <div>API Latans: <span id="apiLatency">34ms</span></div><div>Mikroservis Uptime: %99.98</div>
                            <div>Event Throughput: 1.2k/s</div><div>AI Çıkarım: 210ms</div>
                        </div>
                    </div>
                </div>
                <!-- Paketler -->
                <div class="mt-8">
                    <h2 class="text-2xl font-bold gold-text text-center mb-4"><i class="fas fa-gem"></i> Dijital Vatandaşlık Paketleri</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5" id="packagesContainer"></div>
                </div>
                <!-- Footer (Link ve Kurucu) -->
                <footer class="mt-10 border-t border-[#E4A030]/30 pt-6 pb-4 flex flex-wrap justify-between items-center gap-4 text-sm">
                    <div class="text-xs gold-text/70">
                        <i class="fas fa-copyright"></i> 2026 Anadolu Network FIRE OS — Erdem Yolu Devleti<br>
                        <a href="https://anadolunetwork.tr/?SyfNmb=1&pt=ANASAYFA" target="_blank" class="gold-text hover:underline">https://anadolunetwork.tr/?SyfNmb=1&pt=ANASAYFA</a>
                    </div>
                    <div class="flex gap-6 items-center">
                        <div><i class="fas fa-phone-alt gold-text"></i> 0540 966 6602</div>
                        <div><i class="fab fa-whatsapp text-green-400"></i> <a href="https://wa.me/905409666602" target="_blank" class="hover:gold-text">WhatsApp İş Ortaklığı</a></div>
                        <div><i class="fas fa-envelope"></i> info@anadolu.network</div>
                    </div>
                    <div class="text-xs gold-text/80">Kurucu: CFO.Müh. Orhan Boyraz</div>
                </footer>
            `;
            document.getElementById('dynamicContent').innerHTML = html;
            // Event log'u doldur
            const logDiv = document.getElementById('eventLog');
            if(logDiv) logDiv.innerHTML = eventHistory.map(e => `<div>→ ${e}</div>`).join('');
            // Paketleri göster
            renderPackagesOnDashboard();
            // Chartları başlat
            initCharts();
            updateUI();
            // Saat güncelleme
            updateClock();
            setInterval(updateClock, 1000);
            // AI butonu için event listener (yeniden tanımlamaya gerek yok, global simulateAIPolicy var)
        }

        function renderPackagesOnDashboard() {
            const container = document.getElementById('packagesContainer');
            if(container) {
                container.innerHTML = packagesList.map(pkg => `
                    <div class="glass-card p-4 text-center hover:scale-105 transition">
                        <i class="fas fa-box-open text-2xl gold-text"></i>
                        <h3 class="font-bold text-lg mt-2">${pkg.name}</h3>
                        <p class="text-xs">${pkg.features}</p>
                        <span class="block gold-text font-bold mt-2">${pkg.price}</span>
                    </div>
                `).join('');
            }
        }

        // ----- Vatandaş Yönetim Paneli (CRUD) -----
        function showCitizensPanel() {
            const html = `
                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold gold-text"><i class="fas fa-users"></i> Vatandaş Yönetimi</h2><button onclick="showAddCitizenModal()" class="btn-gold px-4 py-2 rounded-lg">+ Yeni Vatandaş Ekle</button></div>
                    <div class="overflow-x-auto"><table class="w-full text-sm table-custom">
                        <thead><tr class="gold-text border-b border-[#E4A030]/40"><th>ID</th><th>Ad Soyad</th><th>Kimlik No</th><th>Finans Skor</th><th>Eğitim Skor</th><th>İşlemler</th></tr></thead>
                        <tbody id="citizensTableBody"></tbody>
                    </table></div>
                </div>
            `;
            document.getElementById('dynamicContent').innerHTML = html;
            renderCitizensTable();
        }

        function renderCitizensTable() {
            const tbody = document.getElementById('citizensTableBody');
            if(tbody) {
                tbody.innerHTML = citizensList.map(cit => `
                    <tr>
                        <td>${cit.id}</td><td>${cit.name}</td><td>${cit.identity}</td><td>${cit.financeScore}</td><td>${cit.eduScore}</td>
                        <td><button onclick="deleteCitizen(${cit.id})" class="text-red-400 hover:text-red-200"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `).join('');
            }
        }

        window.showAddCitizenModal = function() {
            let name = prompt("Vatandaş Ad Soyad:");
            if(name) {
                let newId = Date.now();
                citizensList.push({ id: newId, name: name, identity: `FIRE-${newId}`, financeScore: 70, eduScore: 70, behaviorScore: 70, govScore: 70 });
                renderCitizensTable();
                addEvent(`citizen.created: ${name} sisteme eklendi`);
            }
        };
        window.deleteCitizen = function(id) {
            citizensList = citizensList.filter(c => c.id !== id);
            renderCitizensTable();
            addEvent(`citizen.deleted: ID ${id} silindi`);
        };

        // ----- Paket Yönetim Paneli (CRUD) -----
        function showPackagesPanel() {
            const html = `
                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold gold-text"><i class="fas fa-boxes"></i> Paket Yönetimi</h2><button onclick="showAddPackageModal()" class="btn-gold px-4 py-2 rounded-lg">+ Yeni Paket Ekle</button></div>
                    <div class="overflow-x-auto"><table class="w-full text-sm table-custom">
                        <thead><tr class="gold-text"><th>ID</th><th>Paket Adı</th><th>Fiyat</th><th>Özellikler</th><th>İşlemler</th></tr></thead>
                        <tbody id="packagesTableBody"></tbody>
                    </table></div>
                </div>
            `;
            document.getElementById('dynamicContent').innerHTML = html;
            renderPackagesTable();
        }

        function renderPackagesTable() {
            const tbody = document.getElementById('packagesTableBody');
            if(tbody) {
                tbody.innerHTML = packagesList.map(pkg => `
                    <tr>
                        <td>${pkg.id}</td><td>${pkg.name}</td><td>${pkg.price}</td><td>${pkg.features}</td>
                        <td><button onclick="deletePackage(${pkg.id})" class="text-red-400 hover:text-red-200"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `).join('');
            }
        }

        window.showAddPackageModal = function() {
            let name = prompt("Paket Adı:");
            if(name) {
                let price = prompt("Fiyat (örnek: ₺299/ay)");
                let features = prompt("Özellikler (kısa açıklama)");
                let newId = Date.now();
                packagesList.push({ id: newId, name: name, price: price || "Belirtilmedi", features: features || "-" });
                renderPackagesTable();
                addEvent(`package.created: ${name} eklendi`);
                if(document.getElementById('packagesContainer')) renderPackagesOnDashboard();
            }
        };
        window.deletePackage = function(id) {
            packagesList = packagesList.filter(p => p.id !== id);
            renderPackagesTable();
            addEvent(`package.deleted: ID ${id} silindi`);
            if(document.getElementById('packagesContainer')) renderPackagesOnDashboard();
        };

        function showMainDashboard() { renderMainDashboard(); }

        // ----- GİRİŞ KONTROLÜ (Email + Şifre) -----
        window.checkEmailPassword = function() {
            let email = document.getElementById('loginEmail').value;
            let pwd = document.getElementById('loginPassword').value;
            if(email === "admin@fireos.com" && pwd === "fire2026") {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainDashboard').classList.remove('hidden');
                renderMainDashboard();
                setInterval(realTimeSimulation, 4800);
                setInterval(() => { if(Math.random() > 0.85) addEvent("system.metrics: tüm servisler çalışıyor"); }, 15000);
                addEvent("session.start: Yönetici girişi başarılı | Yetki seviyesi: Tam Kontrol");
            } else {
                alert("Hatalı e-posta veya şifre! Demo: admin@fireos.com / fire2026");
            }
        };

        document.getElementById('loginPassword')?.addEventListener('keypress', function(e) { if(e.key === 'Enter') checkEmailPassword(); });
    </script>
